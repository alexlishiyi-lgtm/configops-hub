name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: configops
          POSTGRES_PASSWORD: configops_dev
          POSTGRES_DB: configops_dev
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports: ["6379:6379"]

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: configops-hub/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: configops-hub

      - name: Generate Prisma Client
        run: pnpm --filter web prisma generate
        working-directory: configops-hub
        env:
          DATABASE_URL: postgresql://configops:configops_dev@localhost:5432/configops_dev?schema=public

      - name: Run migrations
        run: pnpm --filter web prisma migrate deploy
        working-directory: configops-hub
        env:
          DATABASE_URL: postgresql://configops:configops_dev@localhost:5432/configops_dev?schema=public

      - name: Lint
        run: pnpm --filter web lint
        working-directory: configops-hub

      - name: Build
        run: pnpm --filter web build
        working-directory: configops-hub
        env:
          DATABASE_URL: postgresql://configops:configops_dev@localhost:5432/configops_dev?schema=public
          AUTH_SECRET: ci-test-secret
          GITHUB_ID: ""
          GITHUB_SECRET: ""
